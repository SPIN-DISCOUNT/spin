<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিসকাউন্ট স্পিন হুইল</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1c29 0%, #282b42 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.07);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 400px;
            width: 100%;
        }
        input {
            width: 85%;
            padding: 12px 20px;
            margin: 10px 0;
            border: 2px solid #3498db;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
        }
        input::placeholder { color: #aaa; }
        .wheel-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
            display: none; /* প্রথমে লুকানো থাকবে */
        }
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #fff;
            background: conic-gradient(#ff4757 0deg 120deg, #ffa502 120deg 240deg, #2ed573 240deg 360deg);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .arrow {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 22px solid #fff;
            z-index: 10;
        }
        button {
            background: #2ed573;
            color: #fff;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46,213,115,0.4);
            transition: 0.2s;
            margin-top: 10px;
        }
        button:disabled { background: #747d8c; cursor: not-allowed; box-shadow: none; }
        .result-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.2);
            border-radius: 10px;
            border: 1px solid #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>লাকি স্পিন হুইল</h2>
    <p id="infoText">ডিসকাউন্টে অংশ নিতে আপনার নাম ও জিমেইল দিন:</p>

    <div id="userForm">
        <input type="text" id="userName" placeholder="আপনার নাম" required><br>
        <input type="email" id="userEmail" placeholder="আপনার জিমেইল (example@gmail.com)" required><br>
        <button onclick="validateAndProceed()">সাবমিট করুন</button>
    </div>

    <div class="wheel-container" id="wheelArea">
        <div class="arrow"></div>
        <div class="wheel" id="wheel"></div>
        <button id="spinBtn" style="background: #ff4757; box-shadow: 0 4px 15px rgba(255,71,87,0.4);" onclick="spinWheel()">স্পিন করুন</button>
    </div>

    <div class="result-box" id="resultBox">
        <h3>🎉 অভিনন্দন <span id="clientName"></span>!</h3>
        <h2>আপনি <span id="discountText">০%</span> ডিসকাউন্ট পেয়েছেন!</h2>
        <p>আপনার অফারটি আমাদের এডমিন ডাটাবেজে রেকর্ড করা হয়েছে।</p>
    </div>
</div>

<script>
    // ⚙️ টেলিগ্রাম বট কনফিগারেশন (এখানে আপনার তথ্য বসান)
    const TELEGRAM_BOT_TOKEN = "8427412743:AAHpiv_RKSpPR5_zEF320iqMwCe9af7EgiA"; 
    const TELEGRAM_CHAT_ID = "7875659766"; // চ্যানেল আইডি হলে শুরুতে -100 সহ দিতে হবে (যেমন: -100xxxxxxxxx)

    // গিটহাবে পেজ রিলোড করলেও যেন কততম ইউজার সেটা নষ্ট না হয়, তাই লোকাল ট্র্যাকিং
    if (!localStorage.getItem('global_counter')) {
        localStorage.setItem('global_counter', '1');
    }

    let savedName = "";
    let savedEmail = "";

    // ফর্ম সাবমিট ও জিমেইল চেক
    function validateAndProceed() {
        const nameInput = document.getElementById('userName').value.trim();
        const emailInput = document.getElementById('userEmail').value.trim().toLowerCase();
        
        if (!nameInput || !emailInput || !emailInput.includes('@')) {
            alert("দয়া করে নাম এবং একটি সঠিক জিমেইল আইডি দিন!");
            return;
        }

        // সিকিউরিটি: একই জিমেইল দিয়ে ২য় বার স্পিন আটকানো
        if (localStorage.getItem("spun_" + emailInput)) {
            alert("দুঃখিত! এই জিমেইল দিয়ে ইতিমধ্যে একবার স্পিন করা হয়েছে। আপনি আর সুযোগ পাবেন না।");
            return;
        }

        savedName = nameInput;
        savedEmail = emailInput;

        // ইনপুট ফর্ম লুকিয়ে চাকা ওপেন করা
        document.getElementById('userForm').style.display = 'none';
        document.getElementById('wheelArea').style.display = 'block';
        document.getElementById('infoText').innerText = "এবার 'স্পিন করুন' বাটনে চাপ দিন!";
    }

    // চাকা ঘোরানো এবং লজিক
    function spinWheel() {
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const resultBox = document.getElementById('resultBox');
        
        spinBtn.disabled = true;

        // এই জিমেইলকে চিরতরে লক করে দেওয়া হলো
        localStorage.setItem("spun_" + savedEmail, "true");

        let currentCount = parseInt(localStorage.getItem('global_counter'));
        localStorage.setItem('global_counter', currentCount + 1);

        let discount = 10;
        let targetAngle = 300; // ১০% এর ঘর (সবুজ)

        // নিয়ম: প্রথম ৪ জন ৬০%, পরের ৩ জন ৪০%, বাকিরা ১০%
        if (currentCount <= 4) {
            discount = 60;
            targetAngle = 60; // ৬০% এর ঘর (লাল)
        } else if (currentCount > 4 && currentCount <= 7) {
            discount = 40;
            targetAngle = 180; // ৪০% এর ঘর (হলুদ)
        }

        // চাকা ঘোরানো অ্যানিমেশন
        const totalDegrees = (360 * 5) + targetAngle;
        wheel.style.transform = `rotate(${totalDegrees}deg)`;

        // চাকা থামা এবং টেলিগ্রামে মেসেজ পাঠানো (৪ সেকেন্ড পর)
        setTimeout(() => {
            document.getElementById('clientName').innerText = savedName;
            document.getElementById('discountText').innerText = discount + '%';
            document.getElementById('wheelArea').style.display = 'none';
            resultBox.style.display = 'block';
            document.getElementById('infoText').innerText = "আপনার ডিসকাউন্ট কোড সফলভাবে রেজিস্টার্ড হয়েছে!";

            // 📢 টেলিগ্রামে মেসেজ পাঠানোর টেক্সট ফরম্যাট
            const message = `🔔 *নতুন স্পিন নোটিফিকেশন* 🔔\n\n👤 নাম: ${savedName}\n📧 জিমেইল: ${savedEmail}\n🎁 ডিসকাউন্ট পেয়েছে: *${discount}%*\n🔢 ইউজার নম্বর: #${currentCount}`;

            // টেলিগ্রাম API কল
            const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            
            fetch(telegramUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: "Markdown"
                })
            })
            .then(res => console.log("Telegram Notification Sent!"))
            .catch(err => console.error("Telegram Error: ", err));

        }, 4000);
    }
</script>

</body>
</html>
